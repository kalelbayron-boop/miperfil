<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Dead | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* Pantalla de Entrada */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #overlay p { letter-spacing: 5px; opacity: 0.6; animation: pulse 2s infinite; font-size: 14px; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }

        /* Video de fondo */
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.6; }
        
        .container { text-align: center; z-index: 1; width: 90%; max-width: 450px; }
        h1 { font-size: 3.5rem; letter-spacing: 2px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .quote { font-style: italic; color: #eee; margin: 10px 0; font-size: 0.9rem; }
        .location { font-size: 0.8rem; color: #bbb; margin-bottom: 20px; }

        /* Cuadro de Discord (Lanyard) */
        .discord-status { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .discord-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); object-fit: cover; }
        
        .socials { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .socials a { color: white; font-size: 1.8rem; text-decoration: none; transition: 0.3s; opacity: 0.7; }
        .socials a:hover { opacity: 1; transform: scale(1.1); }

        /* Reproductor con tu imagen de Pinterest */
        .music-card { display: flex; align-items: center; gap: 15px; text-align: left; position: fixed; bottom: 30px; left: 30px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05); }
        .album-art { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); margin: 8px 0; }
        .progress { height: 100%; background: #fff; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div id="overlay" onclick="start()">
        <p>[ CLICK TO ENTER ]</p>
    </div>

    <video id="vid" loop playsinline>
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div class="container">
        <h1>Lin</h1>
        <p class="quote">"I'm not suicidal but man, death sounds so peaceful"</p>
        <p class="location"><i class="fas fa-map-marker-alt"></i> Shibuya</p>

        <div class="discord-status">
            <img id="user-avatar" src="https://i.pinimg.com/1200x/e4/14/da/e414da7e55508a6e6674060b0db53c4f.jpg" class="discord-avatar">
            <div>
                <p style="font-weight: bold; font-size: 0.9rem;">Lin</p>
                <p id="discord-activity" style="font-size: 0.8rem; color: #ccc;">Cargando estado...</p>
            </div>
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-spotify"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-steam"></i></a>
        </div>
    </div>

    <div class="music-card">
        <img src="https://i.pinimg.com/1200x/e4/14/da/e414da7e55508a6e6674060b0db53c4f.jpg" class="album-art">
        <div>
            <strong style="font-size: 0.8rem;">cursed</strong>
            <div class="bar"><div class="progress" id="p-bar"></div></div>
            <p id="time-display" style="font-size: 0.7rem; opacity: 0.6;">0:00 / 0:00</p>
        </div>
    </div>

    <script>
        function start() {
            document.getElementById('overlay').style.display = 'none';
            const v = document.getElementById('vid');
            v.muted = false; // Activa el sonido del video
            v.play();
            fetchStatus();
            
            // Actualiza la barra de progreso del reproductor
            v.ontimeupdate = function() {
                const bar = document.getElementById('p-bar');
                const time = document.getElementById('time-display');
                const pct = (v.currentTime / v.duration) * 100;
                bar.style.width = pct + "%";
                
                const cur = Math.floor(v.currentTime);
                const dur = Math.floor(v.duration) || 0;
                time.innerText = `0:${cur < 10 ? '0'+cur : cur} / 0:${dur < 10 ? '0'+dur : dur}`;
            };
        }

        // Función para conectar con tu Discord mediante Lanyard
        async function fetchStatus() {
            try {
                const response = await fetch('https://api.lanyard.rest/v1/users/1338298959105495160');
                const data = await response.json();
                const presence = data.data;

                // Actualiza tu avatar real de Discord
                if (presence.discord_user.avatar) {
                    const avatarId = presence.discord_user.avatar;
                    const userId = "1338298959105495160";
                    document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${userId}/${avatarId}.png`;
                }

                // Muestra qué estás jugando o haciendo
                if (presence.activities.length > 0) {
                    const activity = presence.activities.find(a => a.type === 0) || presence.activities[0];
                    document.getElementById('discord-activity').innerText = activity.name;
                } else {
                    document.getElementById('discord-activity').innerText = "Just chilling";
                }
            } catch (e) {
                document.getElementById('discord-activity').innerText = "Online";
            }
        }
        
        // Actualiza el estado cada 30 segundos
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
