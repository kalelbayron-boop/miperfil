<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOU DEAD ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; overflow: hidden; }
        
        /* Video de fondo */
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.6; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 0.5s; }
        #overlay p { letter-spacing: 5px; animation: pulse 2s infinite; font-size: 14px; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }

        .container { text-align: center; z-index: 10; width: 95%; max-width: 450px; }

        h1 { font-size: 3rem; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 20px #fff; margin-bottom: 5px; }
        .quote { font-style: italic; color: #ccc; font-size: 0.9rem; margin-bottom: 15px; }
        .location { font-size: 0.7rem; color: #888; margin-bottom: 20px; }

        /* --- TARJETA DISCORD ESTILO FOTO 1 --- */
        .discord-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            text-align: left;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        
        .avatar-area { position: relative; width: 50px; height: 50px; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #1a1a1a; background: #747f8d; }

        .text-area { display: flex; flex-direction: column; }
        .name-row { display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 0.95rem; }
        .verif-blue { color: #3b82f6; font-size: 0.85rem; }
        
        .status-text { font-size: 0.75rem; color: #bbb; margin-top: 2px; display: flex; align-items: center; gap: 5px; }

        /* Icono del juego L4D2 a la derecha */
        .game-icon-right { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        .socials { display: flex; justify-content: center; gap: 18px; margin-top: 25px; }
        .socials a { color: white; font-size: 1.2rem; opacity: 0.6; transition: 0.3s; text-decoration: none; }
        .socials a:hover { opacity: 1; transform: scale(1.1); }

        /* Player Spotify inferior */
        .spotify-mini { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); width: 200px; opacity: 0; transition: 1s; }
        .spotify-mini img { width: 35px; height: 35px; border-radius: 4px; }
        .spotify-mini-info { font-size: 0.7rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .prog-bg { width: 100%; height: 3px; background: #333; margin-top: 5px; border-radius: 2px; }
        .prog-fill { height: 100%; background: #1DB954; width: 0%; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startApp()">
        <p>[ CLICK TO ENTER ]</p>
    </div>

    <video id="bgVideo" loop playsinline>
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div class="container" id="main-content" style="opacity: 0; transition: 1s;">
        <h1>YOU DEAD ❤️</h1>
        <p class="quote">"I'm not suicidal but man, death sounds so peaceful"</p>
        <p class="location"><i class="fas fa-map-marker-alt"></i> Shibuya</p>

        <div class="discord-card">
            <div class="user-info">
                <div class="avatar-area">
                    <img id="discord-avatar" src="" class="avatar-img">
                    <div id="discord-dot" class="status-dot"></div>
                </div>
                <div class="text-area">
                    <div class="name-row">
                        <span id="discord-name">! † Kwssh</span>
                        <i class="fas fa-check-circle verif-blue"></i>
                    </div>
                    <div class="status-text">
                        <i class="fas fa-gamepad" style="opacity: 0.6;"></i> Jugando a Left 4 Dead 2
                    </div>
                </div>
            </div>
            <img src="https://static-cdn.jtvnw.net/ttv-boxart/18928_IGDB-285x380.jpg" class="game-icon-right">
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-spotify"></i></a>
            <a href="https://discord.gg/pz9Bb9As" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://www.instagram.com/itz_andreaa18/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="https://steamcommunity.com/profiles/76561199805419392/" target="_blank"><i class="fab fa-steam"></i></a>
        </div>
    </div>

    <div id="spotify-player" class="spotify-mini">
        <img id="sp-art" src="">
        <div class="spotify-mini-info">
            <b id="sp-title">Nada sonando</b>
            <div class="prog-bg"><div id="sp-bar" class="prog-fill"></div></div>
        </div>
    </div>

    <script>
        const USER_ID = "1338298959105495160";

        function startApp() {
            document.getElementById('overlay').style.opacity = "0";
            setTimeout(() => document.getElementById('overlay').style.display = "none", 500);
            document.getElementById('main-content').style.opacity = "1";
            document.getElementById('spotify-player').style.opacity = "1";
            document.getElementById('bgVideo').play();
            updateLanyard();
            setInterval(updateLanyard, 5000);
        }

        async function updateLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
                const { data } = await res.json();
                
                document.getElementById('discord-name').innerText = data.discord_user.global_name || data.discord_user.username;
                document.getElementById('discord-avatar').src = `https://cdn.discordapp.com/avatars/${USER_ID}/${data.discord_user.avatar}.png`;
                
                const colors = { online: '#43b581', idle: '#faa61a', dnd: '#f04747', offline: '#747f8d' };
                document.getElementById('discord-dot').style.background = colors[data.discord_status] || '#747f8d';

                if(data.listening_to_spotify) {
                    document.getElementById('sp-art').src = data.spotify.album_art_url;
                    document.getElementById('sp-title').innerText = data.spotify.song;
                    const progress = ((Date.now() - data.spotify.timestamps.start) / (data.spotify.timestamps.end - data.spotify.timestamps.start)) * 100;
                    document.getElementById('sp-bar').style.width = progress + "%";
                }
            } catch (e) { console.log(e); }
        }
    </script>
</body>
</html>
