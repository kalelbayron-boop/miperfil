<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lin | Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }
        video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; opacity: 0.6; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 0; }
        .content { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 400px; }
        h1 { font-size: 3rem; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        p { font-style: italic; color: #ddd; margin-bottom: 20px; font-size: 0.9rem; }
        .socials { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .socials a { color: white; font-size: 1.5rem; text-decoration: none; opacity: 0.8; transition: 0.3s; }
        .socials a:hover { opacity: 1; transform: translateY(-3px); }
        .player { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .bar { width: 100%; height: 3px; background: rgba(255,255,255,0.2); margin-top: 10px; border-radius: 2px; }
        .fill { width: 40%; height: 100%; background: white; }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline>
        <source src="fondo.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="content">
        <h1>Lin</h1>
        <p>"I'm not suicidal but man, death sounds so peaceful"</p>
        <div class="socials">
            <a href="#"><i class="fab fa-spotify"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
        </div>
        <div class="player">
            <strong>cursed</strong>
            <div class="bar"><div class="fill"></div></div>
        </div>
    </div>
</body>
</html>
