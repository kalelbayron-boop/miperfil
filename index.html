<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOU DEAD ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #overlay p { letter-spacing: 5px; opacity: 0.6; animation: pulse 2s infinite; font-size: 14px; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }

        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.6; }
        
        .container { text-align: center; z-index: 10; width: 90%; max-width: 450px; position: relative; margin-top: -50px; }

        h1 { font-size: 3.5rem; letter-spacing: 4px; color: #fff; text-transform: uppercase; text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 70px #0ff; animation: flicker 1.5s infinite alternate; }
        @keyframes flicker { 0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 40px #fff, 0 0 70px #0ff; } 20%, 24%, 55% { text-shadow: none; } }

        .quote { font-style: italic; color: #eee; margin: 15px 0; font-size: 1.1rem; }
        .location { font-size: 0.8rem; color: #bbb; margin-bottom: 25px; }

        .discord-status { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: left; margin-bottom: 25px; }
        .discord-avatar-container { position: relative; width: 55px; height: 55px; }
        .discord-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #111; }
        .discord-info { flex: 1; overflow: hidden; }
        .discord-name { font-weight: bold; font-size: 1rem; }
        .discord-activity { font-size: 0.8rem; color: #ccc; }
        .game-icon { width: 45px; height: 45px; border-radius: 8px; display: none; }

        .socials { display: flex; justify-content: center; gap: 15px; }
        .socials a { color: white; font-size: 1.6rem; text-decoration: none; opacity: 0.6; transition: 0.3s; }
        .socials a:hover { opacity: 1; transform: scale(1.2); }

        /* REPRODUCTOR MUSICA COMPACTO */
        .music-card { position: fixed; bottom: 30px; left: 30px; background: rgba(0,0,0,0.6); padding: 12px 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 15px; z-index: 20; min-width: 280px; }
        .album-art { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
        .music-info { flex: 1; }
        .music-title { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 2px; }
        .music-subtitle { font-size: 0.7rem; color: #aaa; }
        
        /* Barra de progreso mediana */
        .progress-container { width: 140px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 8px 0; position: relative; }
        .progress-bar { height: 100%; background: #fff; width: 0%; border-radius: 2px; transition: width 0.1s linear; box-shadow: 0 0 5px #fff; }
        .time-info { font-size: 0.65rem; color: #888; display: flex; justify-content: space-between; }

        #ghost-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .ghost { position: absolute; top: -100px; width: 40px; animation: fall linear infinite; opacity: 0.5; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="overlay" onclick="start()">
        <p>[ CLICK TO ENTER ]</p>
    </div>

    <div id="ghost-container"></div>

    <video id="vid" loop playsinline>
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div class="container">
        <h1>YOU DEAD ❤️</h1>
        <p class="quote">"I'm not suicidal but man, death sounds so peaceful"</p>
        <p class="location"><i class="fas fa-map-marker-alt"></i> Shibuya</p>

        <div class="discord-status">
            <div class="discord-avatar-container">
                <img id="user-avatar" src="" class="discord-avatar">
                <div id="status-dot" class="status-dot"></div>
            </div>
            <div class="discord-info">
                <p id="discord-name" class="discord-name">Cargando...</p>
                <p id="discord-activity" class="discord-activity">Offline</p>
            </div>
            <img id="game-icon" class="game-icon">
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-spotify"></i></a>
            <a href="https://discord.gg/pz9Bb9As" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok">
