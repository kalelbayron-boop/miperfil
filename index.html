<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lin | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.5; }

        .container { text-align: center; z-index: 1; width: 90%; max-width: 450px; }
        h1 { font-size: 3.5rem; letter-spacing: 2px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .quote { font-style: italic; color: #eee; margin: 10px 0; font-size: 0.9rem; }
        .location { font-size: 0.8rem; color: #bbb; margin-bottom: 20px; }

        /* Cuadro de Discord (Lanyard) */
        .discord-status { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .discord-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #555; }

        .socials { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .socials a { color: white; font-size: 1.8rem; text-decoration: none; filter: drop-shadow(0 0 5px #fff); transition: 0.3s; }

        /* Reproductor avanzado */
        .music-card { display: flex; align-items: center; gap: 15px; text-align: left; position: fixed; bottom: 40px; left: 40px; }
        .album-art { width: 60px; height: 60px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .music-info { width: 300px; }
        .bar { width: 100%; height: 3px; background: rgba(255,255,255,0.2); margin: 8px 0; }
        .progress { height: 100%; background: #fff; width: 35%; }
        .controls { font-size: 0.9rem; display: flex; gap: 10px; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="overlay" onclick="start()">
        <p>[ CLICK TO ENTER ]</p>
    </div>

    <video id="vid" loop muted playsinline><source src="fondo.mp4" type="video/mp4"></video>
    <audio id="aud" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div class="container">
        <h1>Lin</h1>
        <p class="quote">I'm not suicidal but man, death sounds so peaceful</p>
        <p class="location"><i class="fas fa-map-marker-alt"></i> Shibuya</p>

        <div class="discord-status">
            <img src="https://lanyard.websandbox.dev/api/123456789/avatar" class="discord-avatar">
            <div>
                <p style="font-weight: bold;">Lin <span style="color: #999;">#0001</span></p>
                <p style="font-size: 0.8rem; color: #ccc;">Playing: Bluestacks 5</p>
            </div>
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-spotify"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-steam"></i></a>
        </div>
    </div>

    <div class="music-card">
        <img src="https://i.pinimg.com/originals/91/91/91/919191.jpg" class="album-art"> <div class="music-info">
            <strong>cursed</strong>
            <div class="bar"><div class="progress" id="p-bar"></div></div>
            <div class="controls">0:15 / 3:31 <i class="fas fa-step-backward"></i> <i class="fas fa-pause"></i> <i class="fas fa-step-forward"></i></div>
        </div>
    </div>

    <script>
        function start() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('vid').play();
            document.getElementById('aud').play();
        }
    </script>
</body>
</html>
