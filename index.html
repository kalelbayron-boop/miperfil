<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOU DEAD ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* PANTALLA DE ENTRADA CON Z-INDEX ALTO */
        #overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
        }
        #overlay p { letter-spacing: 5px; opacity: 0.6; animation: pulse 2s infinite; font-size: 14px; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }

        /* Video de fondo */
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.6; }
        
        .container { text-align: center; z-index: 10; width: 90%; max-width: 450px; position: relative; }

        /* Texto YOU DEAD ❤️ con Neón Eléctrico */
        h1 {
            font-size: 4rem;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fff, 0 0 70px #0ff, 0 0 100px #0ff;
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 40px #fff, 0 0 70px #0ff, 0 0 100px #0ff;
            }
            20%, 24%, 55% { text-shadow: none; }
        }

        .quote { font-style: italic; color: #eee; margin: 15px 0; font-size: 1.1rem; letter-spacing: 1px;}
        .location { font-size: 0.9rem; color: #bbb; margin-bottom: 25px; }

        /* Cuadro de Discord */
        .discord-status { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 18px; border-radius: 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .discord-avatar { width: 60px; height: 60px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); object-fit: cover; }
        .discord-info { flex: 1; }
        .discord-name { font-weight: bold; font-size: 1rem; color: #fff; margin-bottom: 3px; }
        .discord-activity { font-size: 0.85rem; color: #ccc; }
        .discord-extra-icon { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; display: none; }

        .socials { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .socials a { color: white; font-size: 1.8rem; text-decoration: none; transition: 0.3s; opacity: 0.7; }
        .socials a:hover { opacity: 1; transform: scale(1.1); }

        /* Reproductor */
        .music-card { display: flex; align-items: center; gap: 15px; text-align: left; position: fixed; bottom: 30px; left: 30px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05); z-index: 20; }
        .album-art { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); margin: 8px 0; }
        .progress { height: 100%; background: #fff; width: 0%; transition: width 0.1s linear; }

        /* Muñequitos Cayendo - AHORA NO BLOQUEAN LOS CLICKS */
        #character-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
        .falling-character { position: absolute; top: -50px; width: 30px; height: 30px; object-fit: contain; opacity: 0.8; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="overlay" onclick="start()">
        <p>[ CLICK TO ENTER ]</p>
    </div>

    <div id="character-container"></div>

    <video id="vid" loop playsinline>
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div class="container">
        <h1>YOU DEAD ❤️</h1>
        <p class="quote">"I'm not suicidal but man, death sounds so peaceful"</p>
        <p class="location"><i class="fas fa-map-marker-alt"></i> Shibuya</p>

        <div class="discord-status">
            <img id="user-avatar" src="https://i.pinimg.com/1200x/e4/14/da/e414da7e55508a6e6674060b0db53c4f.jpg" class="discord-avatar">
            <div class="discord-info">
                <p class="discord-name">Lin</p>
                <p id="discord-activity" class="discord-activity">Cargando...</p>
                <p id="discord-details" style="font-size: 0.8rem; color: #aaa;"></p>
            </div>
            <img id="discord-extra-icon" src="" class="discord-extra-icon">
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-spotify"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-steam"></i></a>
        </div>

            <strong style="font-size: 0.8rem;">passifista</strong>
            <div class="bar"><div class="progress" id="p-bar"></div></div>
            <p id="time-display" style="font-size: 0.7rem; opacity: 0.6;">0:00 / 0:00</p>
        </div>
    </div>

                char.addEventListener('animationend', () => { char.remove(); });
            }
        }
